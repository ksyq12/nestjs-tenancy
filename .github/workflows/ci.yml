name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenancy
          POSTGRES_PASSWORD: tenancy
          POSTGRES_DB: tenancy_test
        ports:
          - 5433:5432
        options: --health-cmd "pg_isready -U tenancy" --health-interval 2s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate --schema=test/e2e/schema.prisma
        env:
          DATABASE_URL: postgresql://tenancy:tenancy@localhost:5433/tenancy_test
      - run: npx jest --testPathPattern=e2e --runInBand
        env:
          DATABASE_URL: postgresql://tenancy:tenancy@localhost:5433/tenancy_test
          APP_DATABASE_URL: postgresql://app_user:app_user@localhost:5433/tenancy_test
